<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nexdiv — Future-built digital agency</title>
<meta name="description" content="Nexdiv is a digital agency building futuristic websites, AI agents, SaaS products, and growth-focused marketing." />
<meta name="theme-color" content="#020617" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#0a84ff;
    --neon:#39ff14;
    --mint:#00ffa3;
    --night:#020617;
    --night-2:#0b1023;
    --white:#ffffff;
    --primary:var(--blue);
    --accent:var(--neon);
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--night);color:#fff;font-family:'Plus Jakarta Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
  body{min-height:100vh;overflow-x:hidden;position:relative}
  a{color:inherit;text-decoration:none}
  img{max-width:100%;display:block}
  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
  input,select,textarea{font-family:inherit}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(10,132,255,0.4);border-radius:8px}

  /* ─── BACKGROUND VIDEO + FX ─── */
  .bg-wrap{position:fixed;inset:0;z-index:-1;overflow:hidden;background:var(--night)}
  .bg-wrap video,.bg-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.35}
  .bg-wrap::after{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at top,rgba(10,132,255,0.25),transparent 60%),radial-gradient(ellipse at bottom right,rgba(57,255,20,0.12),transparent 60%),linear-gradient(180deg,rgba(2,6,23,0.45),rgba(2,6,23,0.85))}
  .grid-overlay{position:fixed;inset:0;z-index:-1;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse at center,black 30%,transparent 75%)}
  .orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.55;z-index:-1;pointer-events:none;animation:floaty 14s ease-in-out infinite}
  .orb.b{background:var(--blue);width:380px;height:380px;top:-80px;left:-80px}
  .orb.g{background:var(--neon);width:300px;height:300px;bottom:-60px;right:-40px;animation-delay:-6s;opacity:.35}
  @keyframes floaty{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(40px,-30px,0)}}

  /* ─── LAYOUT ─── */
  .container{max-width:1200px;margin:0 auto;padding:0 20px}
  .glass{background:rgba(255,255,255,0.04);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.07)}
  .glass-strong{background:rgba(255,255,255,0.06);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,0.10)}
  .neon-border{box-shadow:0 0 0 1px rgba(57,255,20,0.18) inset, 0 0 30px rgba(10,132,255,0.10)}
  .neon-text{background:linear-gradient(135deg,#fff,var(--mint) 60%,var(--neon));-webkit-background-clip:text;background-clip:text;color:transparent}
  .gradient-btn{background:linear-gradient(90deg,var(--blue),var(--mint));color:var(--night);font-weight:700;border-radius:14px;padding:12px 22px;display:inline-flex;align-items:center;gap:8px;transition:transform .15s ease, box-shadow .2s}
  .gradient-btn:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(57,255,20,0.35)}
  .ghost-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:11px 20px;display:inline-flex;align-items:center;gap:8px;color:#fff;font-weight:600;font-size:14px;transition:background .2s}
  .ghost-btn:hover{background:rgba(10,132,255,0.18)}
  .badge{display:inline-block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.18em;padding:4px 10px;border-radius:999px;background:rgba(57,255,20,0.12);color:var(--neon);border:1px solid rgba(57,255,20,0.35)}
  .label-up{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.62)}

  /* ─── NOTICE BAR ─── */
  .notice{position:fixed;top:0;left:0;right:0;background:linear-gradient(90deg,var(--blue),var(--mint));color:var(--night);font-weight:700;font-size:13px;padding:8px 16px;z-index:60;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px}
  .notice .marquee{display:inline-block;white-space:nowrap;animation:marquee 28s linear infinite}
  @keyframes marquee{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
  .notice.hide{display:none}

  /* ─── NAVBAR ─── */
  nav.navbar{position:fixed;top:34px;left:0;right:0;z-index:50;transition:top .3s}
  nav.navbar.no-notice{top:0}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(2,6,23,0.55);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.06)}
  .logo{display:flex;align-items:center;gap:10px;font-weight:900;letter-spacing:.06em;font-size:18px}
  .logo .logo-mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--mint));display:flex;align-items:center;justify-content:center;color:var(--night);font-weight:900;font-size:18px;box-shadow:0 6px 24px rgba(10,132,255,.45)}
  .nav-links{display:flex;gap:8px;align-items:center}
  .nav-links a{padding:8px 14px;border-radius:10px;font-size:14px;font-weight:600;color:rgba(255,255,255,.78);transition:all .2s}
  .nav-links a:hover,.nav-links a.active{background:rgba(10,132,255,.18);color:#fff}
  .nav-cta{display:flex;gap:8px;align-items:center}
  .nav-toggle{display:none;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;width:40px;height:40px;justify-content:center;align-items:center}
  .nav-toggle svg{width:20px;height:20px}
  @media(max-width:900px){
    .nav-links{position:fixed;top:90px;left:16px;right:16px;background:rgba(2,6,23,0.97);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:14px;flex-direction:column;align-items:stretch;display:none}
    .nav-links.open{display:flex}
    .nav-toggle{display:flex}
    .nav-cta .ghost-btn{display:none}
  }

  /* ─── SECTIONS ─── */
  section.sec{padding:64px 0;position:relative}
  .sec-head{text-align:center;max-width:760px;margin:0 auto 40px}
  .sec-head h2{font-size:clamp(28px,4.5vw,48px);font-weight:900;letter-spacing:-.02em;margin:12px 0 10px}
  .sec-head p{color:rgba(255,255,255,.7);font-size:15px;line-height:1.6}

  /* ─── HERO ─── */
  .hero{padding:140px 0 80px;text-align:center;position:relative}
  .hero h1{font-size:clamp(40px,7vw,84px);font-weight:900;letter-spacing:-.03em;line-height:1.02;margin:18px 0}
  .hero p.lede{max-width:700px;margin:0 auto;color:rgba(255,255,255,.72);font-size:clamp(15px,1.6vw,18px);line-height:1.6}
  .hero .ctas{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:30px}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;max-width:880px;margin:54px auto 0}
  @media(max-width:720px){.stats{grid-template-columns:repeat(2,1fr)}}
  .stat-tile{padding:18px;border-radius:18px;text-align:center}
  .stat-tile .n{font-size:30px;font-weight:900;color:var(--neon)}
  .stat-tile .l{font-size:11px;text-transform:uppercase;letter-spacing:.16em;color:rgba(255,255,255,.6);margin-top:4px}

  /* ─── FEATURE SLIDER ─── */
  .slider{display:flex;gap:14px;overflow-x:auto;scroll-snap-type:x mandatory;padding:8px 0;scrollbar-width:none}
  .slider::-webkit-scrollbar{display:none}
  .slide-card{flex:0 0 auto;width:280px;padding:22px;border-radius:22px;scroll-snap-align:start}
  .slide-card .ic{width:42px;height:42px;border-radius:12px;background:rgba(57,255,20,.15);color:var(--neon);display:flex;align-items:center;justify-content:center;margin-bottom:12px}
  .slide-card h4{font-size:16px;font-weight:800;margin:0 0 6px}
  .slide-card p{font-size:13px;color:rgba(255,255,255,.65);margin:0;line-height:1.5}

  /* ─── CARDS ─── */
  .grid{display:grid;gap:18px}
  .grid-3{grid-template-columns:repeat(3,1fr)}
  .grid-2{grid-template-columns:repeat(2,1fr)}
  @media(max-width:980px){.grid-3{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:640px){.grid-3,.grid-2{grid-template-columns:1fr}}
  .card{padding:22px;border-radius:22px;transition:transform .2s, box-shadow .2s}
  .card:hover{transform:translateY(-4px);box-shadow:0 0 0 1px rgba(57,255,20,0.4) inset, 0 22px 60px rgba(10,132,255,.18)}
  .card .ic{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,rgba(10,132,255,.25),rgba(57,255,20,.20));display:flex;align-items:center;justify-content:center;color:var(--neon);margin-bottom:14px}
  .card h3{font-size:18px;font-weight:800;margin:0 0 6px}
  .card .short{font-size:13px;color:rgba(255,255,255,.7);margin:0 0 12px;line-height:1.55}
  .card .price{font-size:18px;font-weight:900;color:var(--neon);margin-top:10px}
  .card .img{aspect-ratio:16/9;background:rgba(255,255,255,.04);border-radius:14px;overflow:hidden;margin-bottom:14px;position:relative}
  .card .img img{width:100%;height:100%;object-fit:cover}
  .card .meta{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:14px}

  /* package ribbon */
  .pkg-card{position:relative}
  .pkg-card.popular::before{content:"POPULAR";position:absolute;top:14px;right:14px;padding:5px 10px;font-size:10px;font-weight:900;letter-spacing:.16em;background:linear-gradient(90deg,var(--blue),var(--mint));color:var(--night);border-radius:8px}
  .feature-list{margin:14px 0 0;padding:0;list-style:none}
  .feature-list li{font-size:13px;color:rgba(255,255,255,.78);padding:6px 0 6px 24px;position:relative}
  .feature-list li::before{content:"";width:16px;height:16px;position:absolute;left:0;top:7px;border-radius:50%;background:rgba(57,255,20,.18);border:1px solid rgba(57,255,20,.45)}
  .feature-list li::after{content:"";width:6px;height:3px;position:absolute;left:5px;top:13px;border-left:2px solid var(--neon);border-bottom:2px solid var(--neon);transform:rotate(-45deg)}

  /* tool detail */
  .tool-row{padding:0;overflow:hidden;border-radius:24px;margin-bottom:22px}
  .tool-row .tr-grid{display:grid;grid-template-columns:2fr 3fr;gap:0}
  @media(max-width:900px){.tool-row .tr-grid{grid-template-columns:1fr}}
  .tool-row .tr-img{aspect-ratio:16/10;position:relative;background:rgba(255,255,255,.04)}
  .tool-row .tr-img img{width:100%;height:100%;object-fit:cover}
  .tool-row .tr-img .cat{position:absolute;top:14px;left:14px}
  .tool-row .tr-content{padding:28px}
  .screens{display:flex;gap:10px;overflow-x:auto;margin:14px 0 0;scrollbar-width:none}
  .screens::-webkit-scrollbar{display:none}
  .screens img{width:240px;aspect-ratio:16/10;border-radius:12px;object-fit:cover;flex-shrink:0;border:1px solid rgba(255,255,255,.08)}

  /* team */
  .team-card{text-align:center;padding:24px}
  .team-card .av{width:96px;height:96px;border-radius:50%;margin:0 auto 14px;overflow:hidden;border:2px solid rgba(57,255,20,.4);box-shadow:0 8px 30px rgba(10,132,255,.25)}
  .team-card .av img{width:100%;height:100%;object-fit:cover}
  .team-card h3{font-size:16px;margin:6px 0 2px;font-weight:800}
  .team-card .role{font-size:12px;color:var(--neon);font-weight:700;letter-spacing:.1em;text-transform:uppercase}
  .team-card .bio{font-size:13px;color:rgba(255,255,255,.7);margin:10px 0 0;line-height:1.5}
  .team-card .socs{display:flex;gap:6px;justify-content:center;margin-top:14px}
  .team-card .socs a{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;color:#fff;transition:background .2s}
  .team-card .socs a:hover{background:rgba(10,132,255,.25)}

  /* forms */
  .form-row{display:grid;gap:14px}
  .form-row.cols-2{grid-template-columns:1fr 1fr}
  @media(max-width:640px){.form-row.cols-2{grid-template-columns:1fr}}
  .input,.select,.textarea{width:100%;padding:12px 14px;border-radius:12px;background:rgba(2,6,23,0.6);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:14px;outline:none;transition:border-color .15s, box-shadow .15s}
  .input:focus,.select:focus,.textarea:focus{border-color:var(--neon);box-shadow:0 0 0 4px rgba(57,255,20,.12)}
  .textarea{min-height:110px;resize:vertical}
  label.field{display:block}
  label.field .lbl{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.65);display:block;margin-bottom:6px}
  label.field .lbl .req{color:var(--neon);margin-left:3px}

  /* segmented */
  .seg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;background:rgba(2,6,23,0.4);padding:5px;border-radius:14px;border:1px solid rgba(255,255,255,.08)}
  .seg button{padding:9px;border-radius:10px;font-size:13px;font-weight:700;color:rgba(255,255,255,.7);background:transparent;transition:all .2s}
  .seg button.active{background:linear-gradient(90deg,var(--blue),var(--mint));color:var(--night)}

  /* footer */
  footer.foot{margin-top:80px;padding:60px 0 40px;border-top:1px solid rgba(255,255,255,.07);background:rgba(2,6,23,0.5)}
  .foot-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:32px}
  @media(max-width:900px){.foot-grid{grid-template-columns:1fr 1fr}}
  @media(max-width:560px){.foot-grid{grid-template-columns:1fr}}
  .foot h5{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--neon);margin:0 0 14px}
  .foot a{display:block;color:rgba(255,255,255,.7);font-size:13px;margin-bottom:8px}
  .foot a:hover{color:#fff}
  .foot .copy{margin-top:34px;padding-top:22px;border-top:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.5);font-size:12px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .socs-foot{display:flex;gap:8px;margin-top:10px}
  .socs-foot a{width:34px;height:34px;background:rgba(255,255,255,.06);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;margin:0;transition:background .2s}
  .socs-foot a:hover{background:rgba(10,132,255,.3)}

  /* status / banner */
  .alert{padding:12px 14px;border-radius:12px;font-size:13px;margin-bottom:12px}
  .alert.success{background:rgba(57,255,20,.12);color:var(--neon);border:1px solid rgba(57,255,20,.35)}
  .alert.error{background:rgba(255,80,80,.12);color:#ff8a8a;border:1px solid rgba(255,80,80,.35)}
  .alert.info{background:rgba(10,132,255,.12);color:#7fc1ff;border:1px solid rgba(10,132,255,.35)}

  /* admin layout */
  .admin-shell{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
  @media(max-width:900px){.admin-shell{grid-template-columns:1fr}}
  .admin-side{background:rgba(2,6,23,0.85);border-right:1px solid rgba(255,255,255,.06);padding:22px 16px;position:sticky;top:0;height:100vh}
  @media(max-width:900px){.admin-side{position:static;height:auto}}
  .admin-side .sb-nav{display:flex;flex-direction:column;gap:4px;margin-top:14px}
  .admin-side .sb-nav a{font-size:13px;font-weight:600;color:rgba(255,255,255,.7);padding:9px 12px;border-radius:10px}
  .admin-side .sb-nav a.active,.admin-side .sb-nav a:hover{background:rgba(10,132,255,.18);color:#fff}
  .admin-main{padding:30px;max-width:1200px}
  @media(max-width:640px){.admin-main{padding:18px}}
  .admin-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:10px}
  .admin-head h1{font-size:22px;font-weight:800;margin:0}
  .admin-tile{padding:18px;border-radius:18px;text-decoration:none;color:#fff;display:block}
  .admin-tile .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:rgba(255,255,255,.6);margin-bottom:6px}
  .admin-tile .v{font-size:30px;font-weight:900;color:var(--neon)}
  .admin-tile:hover{background:rgba(10,132,255,.1)}

  /* table-ish list */
  .list{display:flex;flex-direction:column;gap:8px}
  .list-row{padding:14px 16px;border-radius:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .list-row .actions{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
  .icon-btn{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.06);display:inline-flex;align-items:center;justify-content:center;transition:background .2s}
  .icon-btn:hover{background:rgba(10,132,255,.2)}
  .icon-btn.danger:hover{background:rgba(255,80,80,.25)}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(2,6,23,.78);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:18px}
  .modal-bg.hidden{display:none}
  .modal{width:100%;max-width:680px;max-height:90vh;overflow-y:auto;border-radius:22px;padding:26px;background:rgba(11,16,35,0.92);border:1px solid rgba(255,255,255,.08)}
  .modal h2{font-size:20px;font-weight:800;margin:0 0 16px}
  .modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}

  /* anim */
  .reveal{opacity:0;transform:translateY(18px);transition:opacity .7s ease, transform .7s ease}
  .reveal.show{opacity:1;transform:none}

  /* utilities */
  .center{text-align:center}
  .row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .grow{flex:1}
  .muted{color:rgba(255,255,255,.65)}
  .pill{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1)}
  .pill.green{background:rgba(57,255,20,.14);color:var(--neon);border-color:rgba(57,255,20,.4)}
  .pill.red{background:rgba(255,80,80,.14);color:#ff8a8a;border-color:rgba(255,80,80,.4)}
  .pill.blue{background:rgba(10,132,255,.14);color:#7fc1ff;border-color:rgba(10,132,255,.4)}
  .pill.gray{background:rgba(255,255,255,.07);color:rgba(255,255,255,.7)}
  .hr{height:1px;background:rgba(255,255,255,.07);margin:18px 0;border:0}

  /* method tile (payment) */
  .method{padding:18px;border-radius:18px;background:linear-gradient(135deg,rgba(10,132,255,.18),rgba(57,255,20,.07));border:1px solid rgba(255,255,255,.08)}
  .method .ml{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.65)}
  .method .mn{font-size:20px;font-weight:900;color:var(--neon);margin:4px 0 6px}
  .method p{margin:0;font-size:12px;color:rgba(255,255,255,.7);line-height:1.5}

  /* loading */
  .spinner{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.2);border-top-color:var(--neon);animation:spin .8s linear infinite;display:inline-block;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* feature slider arrow */
  .pageshell{padding-top:90px}
</style>
</head>
<body>
  <div class="bg-wrap" id="bg-wrap">
    <video id="bg-video" autoplay muted loop playsinline></video>
  </div>
  <div class="grid-overlay"></div>
  <div class="orb b"></div>
  <div class="orb g"></div>

  <div id="notice" class="notice hide" role="status" aria-live="polite">
    <span class="marquee" id="notice-text"></span>
  </div>

  <div id="public-shell">
    <nav class="navbar" id="nav">
      <div class="container nav-inner">
        <a href="#/" class="logo" id="brand">
          <span class="logo-mark">N</span>
          <span id="brand-name">Nexdiv</span>
        </a>
        <div class="nav-links" id="nav-links">
          <a href="#/" data-route="/">Home</a>
          <a href="#/services" data-route="/services">Services</a>
          <a href="#/tools" data-route="/tools">Tools</a>
          <a href="#/packages" data-route="/packages">Packages</a>
          <a href="#/about" data-route="/about">About</a>
          <a href="#/team" data-route="/team">Team</a>
          <a href="#/contact" data-route="/contact">Contact</a>
        </div>
        <div class="nav-cta">
          <a class="ghost-btn" href="#/payment">Pay</a>

  /* ---------- UTILS ---------- */
  function clone(o){return JSON.parse(JSON.stringify(o))}
  function $(sel,el){return (el||document).querySelector(sel)}
  function $$(sel,el){return Array.from((el||document).querySelectorAll(sel))}
  function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
  function fmtBDT(n){if(typeof n!=="number")return n; try{return new Intl.NumberFormat("en-BD",{style:"currency",currency:"BDT",maximumFractionDigits:0}).format(n)}catch(_){return "৳"+n.toLocaleString()}}
  function fmtDate(ts){if(!ts) return "—"; try{return new Date(ts).toLocaleString()}catch(_){return ""}}
  function objToArr(obj){if(!obj) return []; return Object.keys(obj).map(id=>Object.assign({id},obj[id]))}

  /* ---------- ROUTER ---------- */
  function parseHash(){
    let h = location.hash.replace(/^#\/?/,"");
    if (!h) h = "/";
    if (!h.startsWith("/")) h = "/"+h;
    const [path, qs] = h.split("?");
    const params = {};
    if (qs) qs.split("&").forEach(p=>{const [k,v]=p.split("="); if(k) params[decodeURIComponent(k)]=decodeURIComponent(v||"")});
    return { path, params };
  }
  function navigate(path){location.hash = "#"+path}
  function onRoute(){
    state.route = parseHash();
    render();
    window.scrollTo({top:0,behavior:"instant"});
    closeMobileNav();
    highlightNav();
  }
  window.addEventListener("hashchange", onRoute);

  function highlightNav(){
    const p = state.route.path;
    $$(".nav-links a").forEach(a=>{
      const r = a.getAttribute("data-route");
      if (!r) return;
      a.classList.toggle("active", r === p || (r !== "/" && p.startsWith(r)));
    });
  }
  function closeMobileNav(){const n=$("#nav-links");if(n) n.classList.remove("open")}
  $("#nav-toggle").addEventListener("click", ()=>$("#nav-links").classList.toggle("open"));

  /* ---------- THEME / SETTINGS APPLY ---------- */
  function applySettings(){
    const s = state.settings;
    document.title = `${s.siteName} — ${s.tagline}`;
    document.documentElement.style.setProperty("--primary", s.colors.primary);
    document.documentElement.style.setProperty("--accent", s.colors.accent);
    document.documentElement.style.setProperty("--neon", s.colors.neon || s.colors.accent);
    $("#brand-name").textContent = s.siteName;
    const logoMark = $(".logo-mark");
    if (logoMark){
      if (s.logo){
        logoMark.innerHTML = `<img src="${esc(s.logo)}" alt="logo" style="width:100%;height:100%;object-fit:cover;border-radius:10px"/>`;
      } else {
        logoMark.innerHTML = (s.siteName || "N").charAt(0).toUpperCase();
      }
    }
    // notice
    const notice = $("#notice");
    const noticeText = $("#notice-text");
    if (s.notice && s.notice.enabled && s.notice.message){
      notice.classList.remove("hide");
      noticeText.textContent = s.notice.message;
      $("#nav").classList.remove("no-notice");
    } else {
      notice.classList.add("hide");
      $("#nav").classList.add("no-notice");
    }
    // hero video
    const v = $("#bg-video");
    if (s.hero && s.hero.video){
      if (v.getAttribute("data-src") !== s.hero.video){
        v.setAttribute("data-src", s.hero.video);
        v.src = s.hero.video;
        if (s.hero.poster) v.setAttribute("poster", s.hero.poster);
        v.play().catch(()=>{});
      }
    }
  }

  /* ---------- FIREBASE SUBSCRIPTIONS ---------- */
  function subList(path, key, defaults){
    db.ref(path).on("value", snap => {
      const arr = objToArr(snap.val());
      state[key] = arr.length ? arr : clone(defaults);
      if (state.route.path.startsWith("/admin/"+key) || state.route.path === "/" + key || state.route.path === "/admin" || state.route.path === "/") render();
      if (state.route.path === "/payment") render();
    }, err => console.warn("sub "+path, err));
  }
  function subValue(path, key, defaults, onUpdate){
    db.ref(path).on("value", snap => {
      const v = snap.val();
      state[key] = v ? Object.assign({}, defaults, v, {
        colors: Object.assign({}, defaults.colors, (v && v.colors) || {}),
        notice: Object.assign({}, defaults.notice, (v && v.notice) || {}),
        hero: Object.assign({}, defaults.hero, (v && v.hero) || {}),
        contact: Object.assign({}, defaults.contact, (v && v.contact) || {}),
        socials: Object.assign({}, defaults.socials, (v && v.socials) || {}),
        payment: Object.assign({}, defaults.payment, (v && v.payment) || {})
      }) : clone(defaults);
      if (onUpdate) onUpdate();
      render();
    }, err => console.warn("sub "+path, err));
  }
  function startSubscriptions(){
    subValue("settings", "settings", DEFAULT_SETTINGS, applySettings);
    subList("services", "services", DEFAULT_SERVICES);
    subList("packages", "packages", DEFAULT_PACKAGES);
    subList("tools", "tools", DEFAULT_TOOLS);
    subList("team", "team", DEFAULT_TEAM);
    db.ref("orders").on("value", snap => { state.orders = objToArr(snap.val()); if (state.route.path.startsWith("/admin")) render(); }, ()=>{});
    db.ref("messages").on("value", snap => { state.messages = objToArr(snap.val()); if (state.route.path.startsWith("/admin")) render(); }, ()=>{});
  }

  auth.onAuthStateChanged(u => {
    state.user = u;

  function paymentPage(){

      if (pk){preselType="package"; preselSlug=pkgSlug; preselAmt=pk.price||0}
    } else if (svcSlug){
      const sv = state.services.find(x=>(x.slug||x.id)===svcSlug);
      if (sv){preselType="service"; preselSlug=svcSlug; preselAmt=sv.startingPrice||0}

    return `

        <div class="sec-head reveal"><span class="label-up">Payment</span><h2>Complete your <span class="neon-text">order</span></h2><p>Pay via bKash, Nagad, Rocket or bank transfer. Send the transaction ID below — we verify within 1–2 hours.</p></div>

          </aside>

              <div class="form-row cols-2" style="margin-top:14px">

          <div class="form-row cols-2" style="margin-top:14px">
            <label class="field"><span class="lbl">WhatsApp</span><input class="input" name="whatsapp" value="${esc(s.contact.whatsapp)}"/></label>
            <label class="field"><span class="lbl">Address</span><input class="input" name="address" value="${esc(s.contact.address)}"/></label>
          </div>
        </div>
        <div class="card glass-strong neon-border">
          <h3 style="margin:0 0 12px;font-size:16px">Social links</h3>
          <div class="form-row cols-2">
            <label class="field"><span class="lbl">Facebook</span><input class="input" name="facebook" value="${esc(s.socials.facebook||"")}"/></label>
            <label class="field"><span class="lbl">Twitter / X</span><input class="input" name="twitter" value="${esc(s.socials.twitter||"")}"/></label>
            <label class="field"><span class="lbl">Instagram</span><input class="input" name="instagram" value="${esc(s.socials.instagram||"")}"/></label>
            <label class="field"><span class="lbl">LinkedIn</span><input class="input" name="linkedin" value="${esc(s.socials.linkedin||"")}"/></label>
            <label class="field"><span class="lbl">YouTube</span><input class="input" name="youtube" value="${esc(s.socials.youtube||"")}"/></label>
            <label class="field"><span class="lbl">GitHub</span><input class="input" name="github" value="${esc(s.socials.github||"")}"/></label>
          </div>
        </div>
        <div class="card glass-strong neon-border">
          <h3 style="margin:0 0 12px;font-size:16px">Payment numbers</h3>
          <div class="form-row cols-2">
            <label class="field"><span class="lbl">bKash</span><input class="input" name="bkash" value="${esc(s.payment.bkash)}"/></label>
            <label class="field"><span class="lbl">Nagad</span><input class="input" name="nagad" value="${esc(s.payment.nagad)}"/></label>
            <label class="field"><span class="lbl">Rocket</span><input class="input" name="rocket" value="${esc(s.payment.rocket)}"/></label>
            <label class="field"><span class="lbl">Bank name</span><input class="input" name="bankName" value="${esc(s.payment.bankName)}"/></label>
            <label class="field"><span class="lbl">Bank account</span><input class="input" name="bankAccount" value="${esc(s.payment.bankAccount)}"/></label>
            <label class="field"><span class="lbl">Bank branch</span><input class="input" name="bankBranch" value="${esc(s.payment.bankBranch)}"/></label>
          </div>
        </div>
        <div id="settings-status"></div>
      </form>
    `,"/admin/settings");
  }

  /* ---------- FOOTER ---------- */
  function footerHTML(){
    const s = state.settings;
    const so = s.socials || {};
    const links = ["facebook","twitter","instagram","linkedin","youtube","github"]
      .filter(k=>so[k]).map(k=>`<a href="${esc(so[k])}" target="_blank" rel="noopener" aria-label="${k}">${ic(k,14)}</a>`).join("");
    return `
      <div class="container">
        <div class="foot-grid">
          <div>
            <div class="logo"><span class="logo-mark">${s.logo?`<img src="${esc(s.logo)}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:10px"/>`:esc((s.siteName||"N").charAt(0))}</span><span>${esc(s.siteName)}</span></div>
            <p class="muted" style="font-size:13px;margin:12px 0 0;max-width:340px;line-height:1.6">${esc(s.description)}</p>
            <div class="socs-foot">${links}</div>
          </div>
          <div>
            <h5>Company</h5>
            <a href="#/about">About</a><a href="#/team">Team</a><a href="#/contact">Contact</a><a href="#/admin/login">Admin</a>
          </div>
          <div>
            <h5>Services</h5>
            <a href="#/services">Web development</a><a href="#/services">AI agents</a><a href="#/services">SaaS</a><a href="#/services">Marketing</a>
          </div>
          <div>
            <h5>Reach us</h5>
            <a href="mailto:${esc(s.contact.email)}">${esc(s.contact.email)}</a>
            <a href="tel:${esc(s.contact.phone)}">${esc(s.contact.phone)}</a>
            <span class="muted" style="font-size:13px;display:block">${esc(s.contact.address)}</span>
          </div>
        </div>
        <div class="copy">
          <span>© ${new Date().getFullYear()} ${esc(s.siteName)}. All rights reserved.</span>
          <span>Built with futuristic vibes.</span>
        </div>
      </div>`;
  }

  /* ---------- RENDER ---------- */
  function render(){
    const path = state.route.path;
    const isAdmin = path.startsWith("/admin");
    $("#public-shell").style.display = isAdmin ? "none" : "";
    $("#footer").style.display = isAdmin ? "none" : "";
    let html = "";
    if (path === "/") html = homePage();
    else if (path === "/services") html = servicesPage();
    else if (path === "/tools") html = toolsPage();
    else if (path === "/packages") html = packagesPage();
    else if (path === "/about") html = aboutPage();
    else if (path === "/team") html = teamPage();
    else if (path === "/contact") html = contactPage();
    else if (path === "/payment") html = paymentPage();
    else if (path === "/admin/login"){ html = state.user ? "" : adminLoginPage(); if (state.user) { setTimeout(()=>navigate("/admin"),0); } }
    else if (path.startsWith("/admin")){
      if (!state.user) { setTimeout(()=>navigate("/admin/login"),0); html = adminLoginPage(); }
      else if (path === "/admin") html = adminDashboard();
      else if (path === "/admin/services") html = adminServices();
      else if (path === "/admin/packages") html = adminPackages();
      else if (path === "/admin/tools") html = adminTools();
      else if (path === "/admin/team") html = adminTeam();
      else if (path === "/admin/orders") html = adminOrders();
      else if (path === "/admin/messages") html = adminMessages();
      else if (path === "/admin/settings") html = adminSettings();
      else html = adminDashboard();
    } else {
      html = `<section class="sec container center"><h2>404 — Not found</h2><a class="ghost-btn" href="#/">Back home</a></section>`;
    }
    $("#app").innerHTML = html;
    $("#footer").innerHTML = isAdmin ? "" : footerHTML();
    bindAll();
    revealOnScroll();
    highlightNav();
    applySettings();
  }

  function revealOnScroll(){
    const els = $$(".reveal");
    if (!("IntersectionObserver" in window)) { els.forEach(e=>e.classList.add("show")); return; }
    const io = new IntersectionObserver(entries=>{
      entries.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add("show"); io.unobserve(en.target); } });
    },{threshold:0.12});
    els.forEach(e=>io.observe(e));
  }

  /* ---------- EVENT BINDING ---------- */
  function bindAll(){
    // contact form
    const cf = $("#contact-form");
    if (cf){
      cf.addEventListener("submit", async e=>{
        e.preventDefault();
        const status = $("#contact-status");
        status.innerHTML = `<div class="alert info"><span class="spinner"></span> Sending...</div>`;
        const data = Object.fromEntries(new FormData(cf).entries());
        try {
          await db.ref("messages").push(Object.assign({},data,{read:false,createdAt:Date.now()}));
          cf.reset();
          status.innerHTML = `<div class="alert success">Thanks! We'll reply within 1 business hour.</div>`;
        } catch(err){
          status.innerHTML = `<div class="alert error">${esc(err.message||"Failed to send.")}</div>`;
        }
      });
    }
    // payment form
    const pf = $("#payment-form");
    if (pf){
      const seg = $("#pay-seg");
      const updateSelect = ()=>{
        const t = $("#pay-type").value;
        const wrap = $("#pay-select-wrap");
        if (t === "custom"){ wrap.innerHTML = ""; return; }
        const list = t === "package" ? state.packages : state.services;
        const sel = pf.dataset.prefillSlug;
        wrap.innerHTML = `
          <label class="field"><span class="lbl">Choose ${t}</span>
            <select class="select" name="selected" required id="pay-selected">
              <option value="">— Select —</option>
              ${list.map(it=>`<option value="${esc(it.slug||it.id||"")}" ${(it.slug||it.id)===sel?"selected":""}>${esc(it.name||it.title||"")} — ${fmtBDT(it.price||it.startingPrice||0)}</option>`).join("")}
            </select>
          </label>`;
        const sel2 = $("#pay-selected");
        sel2.addEventListener("change", ()=>{
          const it = list.find(x=>(x.slug||x.id)===sel2.value);
          if (it) $("#pay-amount").value = it.price || it.startingPrice || 0;
        });
      };
      seg.addEventListener("click", e=>{
        const btn = e.target.closest("button[data-t]"); if (!btn) return;
        $$(".seg button", seg).forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        $("#pay-type").value = btn.dataset.t;
        if (btn.dataset.t === "custom") $("#pay-amount").value = "";
        updateSelect();
      });
      updateSelect();
      pf.addEventListener("submit", async e=>{
        e.preventDefault();
        const status = $("#pay-status");
        status.innerHTML = `<div class="alert info"><span class="spinner"></span> Submitting...</div>`;
        const data = Object.fromEntries(new FormData(pf).entries());
        const orderId = `NXD-${Date.now()}-${Math.random().toString(36).slice(2,7).toUpperCase()}`;
        try {
          await db.ref("orders").push(Object.assign({},data,{
            amount: Number(data.amount)||0,
            orderId, status:"pending_verification", createdAt:Date.now()
          }));
          pf.reset();
          status.innerHTML = `<div class="alert success">Submitted! Order ID: <strong>${orderId}</strong>. We verify within 1–2 hours.</div>`;
        } catch(err){
          status.innerHTML = `<div class="alert error">${esc(err.message||"Failed to submit.")}</div>`;
        }
      });
    }
    // login
    const lf = $("#login-form");
    if (lf){
      lf.addEventListener("submit", async e=>{
        e.preventDefault();
        const st = $("#login-status");
        st.innerHTML = `<div class="alert info"><span class="spinner"></span> Signing in...</div>`;
        const data = Object.fromEntries(new FormData(lf).entries());
        try {
          await signIn(data.email, data.password);
          st.innerHTML = `<div class="alert success">Welcome.</div>`;
          setTimeout(()=>navigate("/admin"),200);
        } catch(err){
          st.innerHTML = `<div class="alert error">${esc(err.message||"Sign in failed.")}</div>`;
        }
      });
    }
    // signout
    const so = $("#signout-btn");
    if (so) so.addEventListener("click", async ()=>{ await signOut(); navigate("/admin/login"); });
    // seed
    const seed = $("#seed-btn");
    if (seed) seed.addEventListener("click", async ()=>{
      const st = $("#seed-status");
      st.innerHTML = `<span class="spinner"></span> seeding...`;
      try {
        const services = {}; DEFAULT_SERVICES.forEach(s=>services[s.slug]=s);
        const packages = {}; DEFAULT_PACKAGES.forEach(p=>packages[p.slug]=p);
        const tools = {}; DEFAULT_TOOLS.forEach(t=>tools[t.slug]=t);
        const team = {}; DEFAULT_TEAM.forEach(m=>team[m.slug]=m);
        await Promise.all([
          db.ref("services").set(services),
          db.ref("packages").set(packages),
          db.ref("tools").set(tools),
          db.ref("team").set(team),
          db.ref("settings").set(DEFAULT_SETTINGS)
        ]);
        st.innerHTML = `<span style="color:var(--neon)">Seeded.</span>`;
      } catch(err){ st.innerHTML = `<span style="color:#ff8a8a">${esc(err.message)}</span>`; }
    });

    // admin list rows: edit/delete
    $$("[data-action]").forEach(btn=>{
      btn.addEventListener("click", async ()=>{
        const action = btn.dataset.action;
        const id = btn.dataset.id;
        const path = state.route.path; // e.g. /admin/services
        const collection = path.split("/")[2];
        const item = (state[collection]||[]).find(x=>(x.id||x.slug)===id);
        if (action === "delete"){
          if (!confirm("Delete this item?")) return;
          await db.ref(collection+"/"+(item&&item.id?item.id:id)).remove().catch(e=>alert(e.message));
        } else if (action === "edit"){
          openEditModal(collection, item);
        }
      });
    });
    // add
    const addBtn = $("#add-btn");
    if (addBtn){
      addBtn.addEventListener("click", ()=>{
        const collection = state.route.path.split("/")[2];
        openEditModal(collection, null);
      });
    }
    // orders
    $$("#app .list-row [data-act]").forEach(btn=>{
      btn.addEventListener("click", async ()=>{
        const act = btn.dataset.act, id = btn.dataset.id;
        const path = state.route.path;
        if (path === "/admin/orders"){
          if (act === "delete"){ if(!confirm("Delete order?")) return; await db.ref("orders/"+id).remove(); }
          else if (act === "verify") await db.ref("orders/"+id+"/status").set("verified");
          else if (act === "reject") await db.ref("orders/"+id+"/status").set("rejected");
        } else if (path === "/admin/messages"){
          if (act === "delete"){ if(!confirm("Delete message?")) return; await db.ref("messages/"+id).remove(); }
          else if (act === "read") await db.ref("messages/"+id+"/read").set(true);
        }
      });
    });
    // orders status filter
    $$("#app .seg [data-status]").forEach(btn=>{
      btn.addEventListener("click", ()=>{ navigate("/admin/orders?status="+btn.dataset.status); });
    });
    // settings save
    const sf = $("#settings-form");
    if (sf){
      const save = async ()=>{
        const st = $("#settings-status");
        st.innerHTML = `<div class="alert info"><span class="spinner"></span> Saving...</div>`;
        const f = new FormData(sf);
        const obj = Object.fromEntries(f.entries());
        const next = {
          siteName: obj.siteName, tagline: obj.tagline, description: obj.description, logo: obj.logo||"",
          colors: { primary: obj.primary, accent: obj.accent, neon: obj.accent },
          notice: { enabled: !!sf.noticeEnabled.checked, message: obj.noticeMessage||"" },
          hero: { video: obj.heroVideo||"", poster: obj.heroPoster||"" },
          contact: { email: obj.email, phone: obj.phone, whatsapp: obj.whatsapp, address: obj.address },
          socials: { facebook: obj.facebook, twitter: obj.twitter, instagram: obj.instagram, linkedin: obj.linkedin, youtube: obj.youtube, github: obj.github },
          payment: { bkash: obj.bkash, nagad: obj.nagad, rocket: obj.rocket, bankName: obj.bankName, bankAccount: obj.bankAccount, bankBranch: obj.bankBranch }
        };
        try {
          await db.ref("settings").set(next);
          st.innerHTML = `<div class="alert success">Settings saved. Live on the public site.</div>`;
        } catch(err){
          st.innerHTML = `<div class="alert error">${esc(err.message)}</div>`;
        }
      };
      sf.addEventListener("submit", e=>{e.preventDefault(); save();});
      $("#save-settings-btn").addEventListener("click", e=>{e.preventDefault(); save();});
    }
  }

  /* ---------- EDIT MODAL ---------- */
  function fieldHTML(label, name, value, type="text", req=false){
    if (type === "textarea") return `<label class="field"><span class="lbl">${esc(label)} ${req?'<span class="req">*</span>':""}</span><textarea class="textarea" name="${name}" ${req?"required":""}>${esc(value||"")}</textarea></label>`;
    return `<label class="field"><span class="lbl">${esc(label)} ${req?'<span class="req">*</span>':""}</span><input class="input" type="${type}" name="${name}" value="${esc(value!=null?value:"")}" ${req?"required":""}/></label>`;
  }
  function listFieldHTML(label, name, value){
    const arr = Array.isArray(value)?value:[];
    return `<label class="field"><span class="lbl">${esc(label)} <span class="muted" style="font-size:11px">(one per line)</span></span><textarea class="textarea" name="${name}">${esc(arr.join("\n"))}</textarea></label>`;
  }

  function openEditModal(collection, existing){
    const item = existing ? clone(existing) : {};
    const isNew = !existing;
    let body = "";
    if (collection === "services"){
      body = `
        ${fieldHTML("Slug","slug",item.slug||item.id,"text",true)}
        ${fieldHTML("Title","title",item.title,"text",true)}
        ${fieldHTML("Short","short",item.short)}
        ${fieldHTML("Description","description",item.description,"textarea")}
        ${fieldHTML("Image URL","image",item.image)}
        ${fieldHTML("Video URL (optional)","video",item.video||"")}
        ${listFieldHTML("Features","features",item.features)}
        ${fieldHTML("Starting price (BDT)","startingPrice",item.startingPrice,"number",true)}`;
    } else if (collection === "packages"){
      body = `
        ${fieldHTML("Slug","slug",item.slug||item.id,"text",true)}
        ${fieldHTML("Name","name",item.name,"text",true)}
        <label class="field"><span class="lbl">Category</span><select class="select" name="category">${["Website","E-commerce","Marketing","AI"].map(c=>`<option ${item.category===c?"selected":""}>${c}</option>`).join("")}</select></label>
        ${fieldHTML("Pages","pages",item.pages)}
        ${fieldHTML("Price","price",item.price,"number",true)}
        ${fieldHTML("Delivery","delivery",item.delivery)}
        <label class="row"><input type="checkbox" name="popular" ${item.popular?"checked":""}/> Popular</label>
        ${listFieldHTML("Features","features",item.features)}`;
    } else if (collection === "tools"){
      body = `
        ${fieldHTML("Slug","slug",item.slug||item.id,"text",true)}
        ${fieldHTML("Name","name",item.name,"text",true)}
        <label class="field"><span class="lbl">Category</span><select class="select" name="category">${["AI Agent","AI Tool","SaaS","Browser Extension"].map(c=>`<option ${item.category===c?"selected":""}>${c}</option>`).join("")}</select></label>
        ${fieldHTML("Short","short",item.short)}
        ${fieldHTML("Description","description",item.description,"textarea")}
        ${fieldHTML("Demo URL","demoUrl",item.demoUrl)}
        ${fieldHTML("Pricing label","pricing",item.pricing)}
        ${fieldHTML("Cover URL","cover",item.cover)}
        ${listFieldHTML("Screenshots","screenshots",item.screenshots)}
        ${listFieldHTML("Features","features",item.features)}`;
    } else if (collection === "team"){
      const ss = item.socials || {};
      body = `
        ${fieldHTML("Slug","slug",item.slug||item.id,"text",true)}
        ${fieldHTML("Name","name",item.name,"text",true)}
        ${fieldHTML("Role","role",item.role)}
        ${fieldHTML("Avatar URL","avatar",item.avatar)}
        ${fieldHTML("Bio","bio",item.bio,"textarea")}
        ${fieldHTML("Facebook","s_facebook",ss.facebook||"")}
        ${fieldHTML("Twitter","s_twitter",ss.twitter||"")}
        ${fieldHTML("LinkedIn","s_linkedin",ss.linkedin||"")}
        ${fieldHTML("GitHub","s_github",ss.github||"")}
        ${fieldHTML("Instagram","s_instagram",ss.instagram||"")}`;
    }
    const root = $("#modal-root");
    root.innerHTML = `
      <div class="modal">
        <div class="row"><h2 style="margin:0">${isNew?"Add new":"Edit"}</h2><span class="grow"></span><button class="icon-btn" id="modal-close">${ic("x",16)}</button></div>
        <form id="modal-form" style="display:grid;gap:14px;margin-top:12px">${body}</form>
        <div id="modal-status"></div>
        <div class="actions">
          <button class="ghost-btn" id="modal-cancel">Cancel</button>
          <button class="gradient-btn" id="modal-save">${ic("save",14)} Save</button>
        </div>
      </div>`;
    root.classList.remove("hidden");
    const close = ()=>root.classList.add("hidden");
    $("#modal-close").addEventListener("click",close);
    $("#modal-cancel").addEventListener("click",close);
    $("#modal-save").addEventListener("click", async ()=>{
      const form = $("#modal-form");
      const obj = Object.fromEntries(new FormData(form).entries());
      const slug = obj.slug;
      if (!slug){ alert("Slug required"); return; }
      const data = {};
      // common
      if (collection === "services"){
        Object.assign(data, {
          slug, title: obj.title, short: obj.short||"", description: obj.description||"",
          image: obj.image||"", video: obj.video||"",
          features: (obj.features||"").split("\n").map(x=>x.trim()).filter(Boolean),
          startingPrice: Number(obj.startingPrice)||0
        });
      } else if (collection === "packages"){
        Object.assign(data,{
          slug, name: obj.name, category: obj.category,
          pages: obj.pages==="unlimited"?"unlimited":(Number(obj.pages)||0),
          price: Number(obj.price)||0, delivery: obj.delivery||"",
          popular: !!form.popular.checked,
          features: (obj.features||"").split("\n").map(x=>x.trim()).filter(Boolean)
        });
      } else if (collection === "tools"){
        Object.assign(data,{
          slug, name: obj.name, category: obj.category,
          short: obj.short||"", description: obj.description||"",
          demoUrl: obj.demoUrl||"", pricing: obj.pricing||"",
          cover: obj.cover||"",
          screenshots: (obj.screenshots||"").split("\n").map(x=>x.trim()).filter(Boolean),
          features: (obj.features||"").split("\n").map(x=>x.trim()).filter(Boolean)
        });
      } else if (collection === "team"){
        const socials = {};
        ["facebook","twitter","linkedin","github","instagram","youtube"].forEach(k=>{
          if (obj["s_"+k]) socials[k] = obj["s_"+k];
        });
        Object.assign(data,{ slug, name: obj.name, role: obj.role||"", avatar: obj.avatar||"", bio: obj.bio||"", socials });
      }
      try {
        // if slug changed, remove old
        const oldKey = existing && existing.id;
        await db.ref(collection+"/"+slug).set(data);
        if (oldKey && oldKey !== slug) await db.ref(collection+"/"+oldKey).remove();
        close();
      } catch(err){
        $("#modal-status").innerHTML = `<div class="alert error">${esc(err.message)}</div>`;
      }
    });
  }

  /* ---------- BOOT ---------- */
  startSubscriptions();
  state.route = parseHash();
  applySettings();
  render();
  </script>
</body>
</html>
